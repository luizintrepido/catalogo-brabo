name: Rotacionar Criativos Stories

on:
  schedule:
    # A cada 3 dias, às 09:00 BRT (12:00 UTC)
    - cron: '0 12 */3 * *'
  workflow_dispatch:   # permite rodar manualmente pelo botão

jobs:
  rotacionar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Restaurar credenciais Google Drive
        run: |
          echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" | base64 -d > scraper/credentials.json
          echo "${{ secrets.GOOGLE_TOKEN_JSON }}" | base64 -d > scraper/token.json

      - name: Rodar rotacao de stories
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python story_rotator/rotacionar.py

      - name: Salvar fotos usadas
        run: |
          git config user.name "Story Rotator Bot"
          git config user.email "bot@noreply.github.com"
          git add story_rotator/usadas.json
          git diff --staged --quiet && echo "Sem trocas" || (git commit -m "rotacao stories $(TZ=America/Sao_Paulo date +'%d/%m %H:%M')" && git push)
