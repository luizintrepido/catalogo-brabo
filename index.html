<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo Brabo — Veículos</title>
  <meta name="description" content="Catálogo de veículos seminovos. Compre com confiança, fale no WhatsApp." />

  <style>
    :root {
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --bg3: #242424;
      --border: #2e2e2e;
      --orange: #ff6b00;
      --orange2: #ff8c00;
      --text: #f0f0f0;
      --text2: #a0a0a0;
      --green: #25d366;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: -0.5px;
      white-space: nowrap;
    }
    .logo span { color: var(--text); }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    #updated-at {
      font-size: 0.75rem;
      color: var(--text2);
      white-space: nowrap;
    }

    /* ── SEARCH BAR ── */
    .search-wrap {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    #search-input {
      flex: 1;
      min-width: 200px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #search-input:focus { border-color: var(--orange); }
    #search-input::placeholder { color: var(--text2); }
    select.filter-select {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }
    select.filter-select:focus { border-color: var(--orange); }

    /* ── FILTER PILLS ── */
    .pills-wrap {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .pill {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text2);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
      user-select: none;
    }
    .pill:hover { border-color: var(--orange); color: var(--text); }
    .pill.active {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }
    .pill-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }

    /* ── RESULTS INFO ── */
    .results-bar {
      padding: 10px 20px;
      font-size: 0.82rem;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .results-bar strong { color: var(--orange); }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 0 20px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      border-color: var(--orange);
    }
    .card-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      display: block;
    }
    .card-img-placeholder {
      width: 100%;
      aspect-ratio: 1/1;
      display: block;
      object-fit: cover;
    }
    .card-body {
      padding: 14px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 2px;
    }
    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    .badge-loja-recar { background: #1a3a5c; color: #60b0ff; }
    .badge-loja-reauto { background: #3a1a00; color: #ff8c40; }
    .badge-tipo {
      background: var(--bg3);
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .card-versao {
      font-size: 0.78rem;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-specs {
      display: flex;
      gap: 12px;
      font-size: 0.8rem;
      color: var(--text2);
      margin-top: 2px;
      flex-wrap: wrap;
    }
    .card-specs span { display: flex; align-items: center; gap: 3px; }
    .card-price {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--orange);
      margin-top: auto;
      padding-top: 8px;
    }
    .card-price-zero { color: var(--text2); font-size: 0.9rem; font-weight: 400; }
    .card-fotos-count {
      font-size: 0.72rem;
      color: var(--text2);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text2);
    }
    .empty-state .icon { font-size: 4rem; margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.2rem; color: var(--text); margin-bottom: 8px; }

    /* ── LOADING ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
      color: var(--text2);
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MODAL ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      overflow-y: auto;
      padding: 20px;
    }
    #modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
    #modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 900px;
      margin: auto;
      overflow: hidden;
      box-shadow: 0 8px 60px rgba(0,0,0,0.8);
    }
    #modal-close {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1001;
      transition: background 0.2s;
    }
    #modal-close:hover { background: var(--orange); border-color: var(--orange); }

    /* ── GALLERY ── */
    .gallery-wrap {
      position: relative;
      background: #000;
      aspect-ratio: 16/9;
    }
    .gallery-main {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .gallery-main-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    .gallery-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 2;
    }
    .gallery-nav:hover { background: var(--orange); }
    .gallery-nav.prev { left: 10px; }
    .gallery-nav.next { right: 10px; }
    .gallery-counter {
      position: absolute;
      bottom: 10px;
      right: 14px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .gallery-thumbs {
      display: flex;
      gap: 6px;
      padding: 10px 14px;
      overflow-x: auto;
      background: #111;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .gallery-thumbs::-webkit-scrollbar { height: 4px; }
    .gallery-thumbs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .gallery-thumb {
      width: 70px;
      height: 50px;
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      flex-shrink: 0;
      opacity: 0.6;
      transition: opacity 0.15s, border-color 0.15s;
    }
    .gallery-thumb.active, .gallery-thumb:hover {
      border-color: var(--orange);
      opacity: 1;
    }
    .gallery-no-photo {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .gallery-no-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .gallery-no-photo span { display: none; }

    /* ── MODAL DETAILS ── */
    .modal-details {
      padding: 20px 24px 28px;
    }
    .modal-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .modal-title-block { flex: 1; min-width: 200px; }
    .modal-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .modal-title {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.2;
      color: var(--text);
    }
    .modal-versao {
      font-size: 0.88rem;
      color: var(--text2);
      margin-top: 4px;
    }
    .modal-price-block { text-align: right; }
    .modal-price {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--orange);
    }
    .modal-price-zero { font-size: 1rem; color: var(--text2); }

    /* specs grid */
    .specs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .spec-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .spec-label {
      font-size: 0.7rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .spec-value {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
    }

    /* opcionais */
    .opcionais-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .opcionais-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }
    .opcional-tag {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.78rem;
      color: var(--text2);
    }

    /* CTA buttons */
    .modal-cta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn-wpp {
      flex: 1;
      min-width: 180px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      transition: filter 0.2s;
    }
    .btn-wpp:hover { filter: brightness(1.1); }
    .btn-site {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-site:hover { border-color: var(--orange); color: var(--text); }
    .btn-share {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .btn-share:hover { border-color: var(--orange); color: var(--orange); }
    .btn-share.copied { border-color: #22c55e; color: #22c55e; background: rgba(34,197,94,0.08); }

    /* ── FOOTER ── */
    footer {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 20px;
      font-size: 0.78rem;
      color: var(--text2);
      margin-top: 20px;
    }
    footer a { color: var(--orange); text-decoration: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); padding: 0 12px 30px; }
      .search-wrap { padding: 10px 12px; }
      .pills-wrap { padding: 8px 12px; }
      header { padding: 12px; }
      .modal-details { padding: 16px; }
      .modal-price { font-size: 1.4rem; }
      .specs-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Catálogo<span> Brabo</span></div>
  <div class="header-right">
    <span id="updated-at">Carregando...</span>
  </div>
</header>

<!-- SEARCH + SORT -->
<div class="search-wrap">
  <input type="text" id="search-input" placeholder="Buscar por marca, modelo, versão..." />
  <select id="sort-select" class="filter-select">
    <option value="preco-asc">Menor preço</option>
    <option value="preco-desc">Maior preço</option>
    <option value="ano-desc">Mais novo</option>
    <option value="ano-asc">Mais antigo</option>
    <option value="km-asc">Menor KM</option>
  </select>
  <select id="loja-select" class="filter-select">
    <option value="">Todas as lojas</option>
    <option value="RECAR">RECAR</option>
    <option value="REAUTO">REAUTO</option>
  </select>
</div>

<!-- FILTER PILLS -->
<div class="pills-wrap">
  <span style="font-size:0.8rem;color:var(--text2);margin-right:4px;">Tipo:</span>
  <button class="pill active" data-tipo="">Todos</button>
  <button class="pill" data-tipo="SUV">SUV</button>
  <button class="pill" data-tipo="HATCH">Hatch</button>
  <button class="pill" data-tipo="SEDAN">Sedan</button>
  <button class="pill" data-tipo="PICAPE">Picape</button>
  <button class="pill" data-tipo="MOTO">Moto</button>
  <div class="pill-sep"></div>
  <span style="font-size:0.8rem;color:var(--text2);margin-right:4px;">Preço:</span>
  <button class="pill" data-preco="">Todos</button>
  <button class="pill" data-preco="0-50000">Até R$50k</button>
  <button class="pill" data-preco="50000-80000">R$50k–80k</button>
  <button class="pill" data-preco="80000-120000">R$80k–120k</button>
  <button class="pill" data-preco="120000-999999">Acima R$120k</button>
</div>

<!-- RESULTS BAR -->
<div class="results-bar">
  <span id="results-count">...</span>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <span>Carregando catálogo...</span>
</div>

<!-- GRID -->
<div class="grid" id="cars-grid" style="display:none;"></div>

<!-- MODAL -->
<div id="modal-overlay">
  <button id="modal-close" title="Fechar">✕</button>
  <div id="modal">
    <!-- gallery -->
    <div class="gallery-wrap" id="gallery-wrap">
      <div class="gallery-main-wrap" id="gallery-main-wrap">
        <img class="gallery-main" id="gal-main-img" src="" alt="Foto do veículo" style="display:none" />
        <div class="gallery-no-photo" id="gallery-no-photo" style="display:none">
          <img src="em-preparacao.jpg" alt="Em preparação" /><span>Em preparação</span>
        </div>
      </div>
      <button class="gallery-nav prev" id="gal-prev">‹</button>
      <button class="gallery-nav next" id="gal-next">›</button>
      <div class="gallery-counter" id="gal-counter"></div>
    </div>
    <div class="gallery-thumbs" id="gallery-thumbs"></div>
    <!-- details -->
    <div class="modal-details" id="modal-details"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>Catálogo atualizado automaticamente &bull; <a href="https://wa.me/5513991575019" target="_blank">WhatsApp: (13) 99157-5019</a></p>
</footer>

<script>
  const JSON_URL = 'https://raw.githubusercontent.com/luizintrepido/catalogo-brabo/master/vehicles.json';
  const WHATSAPP = '5513991575019';

  let allVehicles = [];
  let filtered = [];
  let activeFilters = { tipo: '', preco: '' };
  let currentGalIdx = 0;
  let currentGalPhotos = [];

  // ─── UTILS ────────────────────────────────────────────────────
  const fmtPreco = v => v ? 'R$ ' + v.toLocaleString('pt-BR') : '';
  const fmtKm   = v => v ? v.toLocaleString('pt-BR') + ' km' : '—';
  const thumbUrl = id => `https://drive.google.com/thumbnail?id=${id}&sz=w520`;
  const fullUrl  = id => `https://drive.google.com/uc?id=${id}&export=view`;

  function fmtDate(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    } catch { return iso; }
  }

  // ─── LOAD DATA ─────────────────────────────────────────────────
  async function loadData() {
    try {
      const r = await fetch(JSON_URL + '?t=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      allVehicles = data.vehicles || [];
      document.getElementById('updated-at').textContent = 'Atualizado em: ' + fmtDate(data.updated_at);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('cars-grid').style.display = 'grid';
      applyFilters();
      // Abre automaticamente se a URL tiver #carro-{id}
      checkHashAndOpenModal();
    } catch (e) {
      document.getElementById('loading').innerHTML = `
        <div style="text-align:center;color:var(--text2);">
          <div style="font-size:3rem;margin-bottom:12px;">⚠️</div>
          <p>Não foi possível carregar o catálogo.</p>
          <p style="font-size:0.8rem;margin-top:8px;">${e.message}</p>
          <button onclick="loadData()" style="margin-top:16px;padding:10px 20px;background:var(--orange);border:none;color:#fff;border-radius:8px;cursor:pointer;font-size:0.9rem;">Tentar novamente</button>
        </div>`;
    }
  }

  // ─── FILTER & SORT ─────────────────────────────────────────────
  function applyFilters() {
    const q = document.getElementById('search-input').value.toLowerCase().trim();
    const sort = document.getElementById('sort-select').value;
    const loja = document.getElementById('loja-select').value;
    const tipoF = activeFilters.tipo;
    const precoF = activeFilters.preco;

    filtered = allVehicles.filter(v => {
      if (q) {
        const hay = `${v.marca} ${v.modelo} ${v.versao} ${v.ano} ${v.tipo}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      if (loja && v.loja !== loja) return false;
      if (tipoF && v.tipo !== tipoF) return false;
      if (precoF) {
        const [mn, mx] = precoF.split('-').map(Number);
        if (v.preco < mn || v.preco > mx) return false;
      }
      return true;
    });

    // Sort
    filtered.sort((a, b) => {
      if (sort === 'preco-asc')  return (a.preco||0) - (b.preco||0);
      if (sort === 'preco-desc') return (b.preco||0) - (a.preco||0);
      if (sort === 'ano-desc')   return (b.ano||0) - (a.ano||0);
      if (sort === 'ano-asc')    return (a.ano||0) - (b.ano||0);
      if (sort === 'km-asc')     return (a.km||0) - (b.km||0);
      return 0;
    });

    renderGrid();
  }

  // ─── RENDER GRID ──────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('cars-grid');
    const rc = document.getElementById('results-count');

    rc.innerHTML = `Mostrando <strong>${filtered.length}</strong> de <strong>${allVehicles.length}</strong> veículos`;

    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state">
        <div class="icon">🔍</div>
        <h3>Nenhum veículo encontrado</h3>
        <p>Tente outros filtros ou termos de busca.</p>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map((v, i) => {
      const foto = v.fotos_drive && v.fotos_drive.length ? thumbUrl(v.fotos_drive[0]) : null;
      const precoHtml = v.preco
        ? `<div class="card-price">${fmtPreco(v.preco)}</div>`
        : `<div class="card-price card-price-zero">Consultar preço</div>`;
      const lojaClass = v.loja === 'RECAR' ? 'badge-loja-recar' : 'badge-loja-reauto';
      const nFotos = v.fotos_drive ? v.fotos_drive.length : 0;

      return `<div class="card" onclick="openModal(${i})">
        ${foto
          ? `<img class="card-img" src="${foto}" alt="${v.marca} ${v.modelo}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block';" /><img class="card-img-placeholder" src="em-preparacao.jpg" alt="Em preparação" style="display:none" />`
          : `<img class="card-img-placeholder" src="em-preparacao.jpg" alt="Em preparação" />`}
        <div class="card-body">
          <div class="card-badges">
            <span class="badge ${lojaClass}">${v.loja}</span>
            <span class="badge badge-tipo">${v.tipo || 'SUV'}</span>
          </div>
          <div class="card-title">${v.marca} ${v.modelo}</div>
          <div class="card-versao">${v.versao || '—'}</div>
          <div class="card-specs">
            <span>📅 ${v.ano || '—'}</span>
            <span>🛣️ ${fmtKm(v.km)}</span>
            ${v.cambio ? `<span>⚙️ ${v.cambio}</span>` : ''}
          </div>
          ${precoHtml}
          ${nFotos > 0 ? `<div class="card-fotos-count">${nFotos} foto${nFotos>1?'s':''}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  // ─── MODAL ─────────────────────────────────────────────────────
  function openModal(idx) {
    const v = filtered[idx];
    if (!v) return;

    currentVehicle    = v;
    currentGalPhotos  = v.fotos_drive || [];
    currentGalIdx     = 0;

    renderGallery();
    renderModalDetails(v);

    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';

    // Atualiza a URL com o ID do carro para link direto
    history.pushState({ carId: v.id }, '', `#carro-${v.id}`);

    // Meta Pixel — ViewContent
    if (typeof fbq !== 'undefined') {
      fbq('track', 'ViewContent', {
        content_name: `${v.marca} ${v.modelo} ${v.ano}`,
        content_category: v.tipo || 'Veículo',
        content_ids: [v.id],
        content_type: 'vehicle',
        value: v.preco || 0,
        currency: 'BRL'
      });
    }
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
    // Remove o hash da URL ao fechar
    history.pushState(null, '', window.location.pathname);
  }

  function renderGallery() {
    const mainImg  = document.getElementById('gal-main-img');
    const thumbsEl = document.getElementById('gallery-thumbs');
    const counter  = document.getElementById('gal-counter');
    const noPhoto  = document.getElementById('gallery-no-photo');
    const prevBtn  = document.getElementById('gal-prev');
    const nextBtn  = document.getElementById('gal-next');

    if (!currentGalPhotos.length) {
      mainImg.style.display  = 'none';
      noPhoto.style.display  = 'flex';
      thumbsEl.innerHTML     = '';
      counter.textContent    = '';
      prevBtn.style.display  = 'none';
      nextBtn.style.display  = 'none';
      return;
    }

    // Mostra imagem principal, esconde placeholder
    noPhoto.style.display  = 'none';
    mainImg.style.display  = 'block';
    mainImg.src            = thumbUrl(currentGalPhotos[0]);
    prevBtn.style.display  = 'flex';
    nextBtn.style.display  = 'flex';
    counter.textContent    = `1 / ${currentGalPhotos.length}`;

    // Thumbs
    thumbsEl.innerHTML = currentGalPhotos.map((id, i) =>
      `<img class="gallery-thumb ${i===0?'active':''}" src="${thumbUrl(id)}" data-idx="${i}" alt="Foto ${i+1}" loading="lazy" />`
    ).join('');

    thumbsEl.querySelectorAll('.gallery-thumb').forEach(t => {
      t.addEventListener('click', () => setGalPhoto(parseInt(t.dataset.idx)));
    });
  }

  function setGalPhoto(idx) {
    if (!currentGalPhotos.length) return;
    idx = (idx + currentGalPhotos.length) % currentGalPhotos.length;
    currentGalIdx = idx;

    const mainImg = document.getElementById('gal-main-img');
    if (mainImg) mainImg.src = thumbUrl(currentGalPhotos[idx]);

    document.querySelectorAll('.gallery-thumb').forEach((t, i) => {
      t.classList.toggle('active', i === idx);
    });

    document.getElementById('gal-counter').textContent = `${idx+1} / ${currentGalPhotos.length}`;

    const thumb = document.querySelector(`.gallery-thumb[data-idx="${idx}"]`);
    if (thumb) thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  document.getElementById('gal-prev').addEventListener('click', () => setGalPhoto(currentGalIdx - 1));
  document.getElementById('gal-next').addEventListener('click', () => setGalPhoto(currentGalIdx + 1));

  function renderModalDetails(v) {
    const el = document.getElementById('modal-details');
    const lojaClass = v.loja === 'RECAR' ? 'badge-loja-recar' : 'badge-loja-reauto';

    const wppMsg = encodeURIComponent(
      `Olá! Vi o ${v.marca} ${v.modelo} ${v.ano} no catálogo e quero mais informações.`
    );
    const wppLink = `https://wa.me/${v.whatsapp || WHATSAPP}?text=${wppMsg}`;

    const specs = [
      { label: 'Ano', value: v.ano || '—' },
      { label: 'Quilometragem', value: fmtKm(v.km) },
      { label: 'Câmbio', value: v.cambio || '—' },
      { label: 'Combustível', value: v.combustivel || '—' },
      { label: 'Cor', value: v.cor || '—' },
      { label: 'Tipo', value: v.tipo || '—' },
    ].filter(s => s.value && s.value !== '—' || s.label === 'Ano');

    const specHtml = specs.map(s => `
      <div class="spec-item">
        <div class="spec-label">${s.label}</div>
        <div class="spec-value">${s.value}</div>
      </div>`).join('');

    const opcionaisHtml = v.opcionais && v.opcionais.length
      ? `<div class="opcionais-title">Opcionais</div>
         <div class="opcionais-list">${v.opcionais.map(o => `<span class="opcional-tag">${o}</span>`).join('')}</div>`
      : '';

    const precoHtml = v.preco
      ? `<div class="modal-price">${fmtPreco(v.preco)}</div>`
      : `<div class="modal-price-zero">Consultar preço</div>`;

    el.innerHTML = `
      <div class="modal-top">
        <div class="modal-title-block">
          <div class="modal-badges">
            <span class="badge ${lojaClass}">${v.loja}</span>
            <span class="badge badge-tipo">${v.tipo || 'SUV'}</span>
          </div>
          <div class="modal-title">${v.marca} ${v.modelo}</div>
          <div class="modal-versao">${v.versao || ''}</div>
        </div>
        <div class="modal-price-block">${precoHtml}</div>
      </div>
      <div class="specs-grid">${specHtml}</div>
      ${opcionaisHtml}
      <div class="modal-cta">
        <a class="btn-wpp" href="${wppLink}" target="_blank" rel="noopener" onclick="if(typeof fbq!=='undefined'){fbq('track','Lead',{content_name:'${v.marca} ${v.modelo} ${v.ano}',content_category:v.tipo||'Veículo',value:${v.preco||0},currency:'BRL'});}">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Quero esse carro!
        </a>
        <button class="btn-share" id="btn-share" onclick="shareVehicle()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Compartilhar
        </button>
      </div>`;
  }

  // ─── LINK DIRETO POR HASH ──────────────────────────────────────
  function checkHashAndOpenModal() {
    const hash = window.location.hash; // ex: #carro-970817
    if (!hash.startsWith('#carro-')) return;
    const carId = hash.replace('#carro-', '');
    const idx = filtered.findIndex(v => String(v.id) === carId);
    if (idx !== -1) {
      openModal(idx);
    } else {
      // Carro pode estar filtrado — busca em todos
      const idxAll = allVehicles.findIndex(v => String(v.id) === carId);
      if (idxAll !== -1) {
        // Limpa filtros e abre
        filtered = allVehicles;
        openModal(idxAll);
      }
    }
  }

  // Também responde ao botão Voltar do navegador
  window.addEventListener('popstate', () => {
    if (!window.location.hash) {
      closeModal();
    } else {
      checkHashAndOpenModal();
    }
  });

  // ─── COMPARTILHAR ──────────────────────────────────────────────
  let currentVehicle = null;

  function shareVehicle() {
    const v = currentVehicle;
    if (!v) return;

    const preco  = v.preco ? `R$ ${Number(v.preco).toLocaleString('pt-BR')}` : 'Consultar';
    const km     = v.km    ? `${Number(v.km).toLocaleString('pt-BR')} km`    : '';
    const url    = `https://luizintrepido.github.io/catalogo-brabo/carros/${v.id}`;

    const texto = `🚗 *${v.marca} ${v.modelo} ${v.ano}*\n${v.versao ? v.versao + '\n' : ''}💰 ${preco}${km ? '\n📍 ' + km : ''}\n\n🔗 Ver este carro:\n${url}`;

    // Tenta Web Share API (funciona no celular)
    if (navigator.share) {
      navigator.share({ title: `${v.marca} ${v.modelo} ${v.ano}`, text: texto, url })
        .catch(() => {});
      return;
    }

    // Fallback: copia para área de transferência
    navigator.clipboard.writeText(texto).then(() => {
      const btn = document.getElementById('btn-share');
      if (!btn) return;
      btn.classList.add('copied');
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copiado!`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Compartilhar`;
      }, 2500);
    }).catch(() => {
      // Último fallback: abre WhatsApp com o texto
      window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
    });
  }

  // ─── EVENTS ────────────────────────────────────────────────────
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  document.addEventListener('keydown', e => {
    if (!document.getElementById('modal-overlay').classList.contains('open')) return;
    if (e.key === 'Escape') closeModal();
    if (e.key === 'ArrowLeft')  setGalPhoto(currentGalIdx - 1);
    if (e.key === 'ArrowRight') setGalPhoto(currentGalIdx + 1);
  });

  document.getElementById('search-input').addEventListener('input', applyFilters);
  document.getElementById('sort-select').addEventListener('change', applyFilters);
  document.getElementById('loja-select').addEventListener('change', applyFilters);

  // Tipo pills
  document.querySelectorAll('.pill[data-tipo]').forEach(p => {
    p.addEventListener('click', () => {
      document.querySelectorAll('.pill[data-tipo]').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      activeFilters.tipo = p.dataset.tipo;
      applyFilters();
    });
  });

  // Preço pills
  document.querySelectorAll('.pill[data-preco]').forEach(p => {
    p.addEventListener('click', () => {
      document.querySelectorAll('.pill[data-preco]').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      activeFilters.preco = p.dataset.preco;
      applyFilters();
    });
  });

  // ─── INIT ──────────────────────────────────────────────────────
  loadData();
</script>
</body>
</html>
