<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo Brabo — Veículos</title>
  <meta name="description" content="Catálogo de veículos seminovos. Compre com confiança, fale no WhatsApp." />

  <!-- Fontes da marca: Oswald (titulos/preco) + DM Sans (corpo) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    :root {
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --bg3: #242424;
      --border: #2e2e2e;
      --orange: #ff6b00;
      --orange2: #ff8c00;
      --gold: #e6b873;
      --gold2: #f4d29a;
      --text: #f0f0f0;
      --text2: #a0a0a0;
      --green: #25d366;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.5);
      --font-head: 'Oswald', 'Segoe UI', system-ui, sans-serif;
      --font-body: 'DM Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(180deg, #1d1d1d 0%, var(--bg2) 100%);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(230,184,115,0.14), 0 6px 18px rgba(0,0,0,0.45);
      padding: 12px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: nowrap;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      min-width: 0;
    }
    .brand-logo {
      height: 84px;
      width: auto;
      display: block;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
      transition: transform .15s ease;
    }
    .brand:hover .brand-logo { transform: scale(1.04); }
    /* divisor sutil entre logo e wordmark */
    .logo {
      font-family: var(--font-head);
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      line-height: 0.95;
      white-space: nowrap;
      padding-left: 14px;
      border-left: 2px solid rgba(230,184,115,0.45);
    }
    .logo span { color: var(--text); display: block; font-size: 0.95rem; color: var(--text2); letter-spacing: 2.5px; }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: nowrap;
      flex-shrink: 0;
    }
    #updated-at {
      font-size: 0.75rem;
      color: var(--text2);
      white-space: nowrap;
    }
    /* ── CTA "Conheça o Brabo" (fixo no topo via header sticky) ── */
    .btn-brabo {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff6b00 0%, #ff8c00 52%, #ffc15e 100%);
      color: #1a0d00;
      font-weight: 900;
      font-size: 0.8rem;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      text-decoration: none;
      white-space: nowrap;
      border: 1px solid #ffd591;
      box-shadow: 0 4px 14px rgba(255,107,0,0.35);
      animation: braboPulse 2.6s ease-in-out infinite;
      transition: transform .12s ease, box-shadow .2s ease;
    }
    .btn-brabo:hover { transform: translateY(-1px) scale(1.04); box-shadow: 0 6px 22px rgba(255,140,0,0.55); }
    .btn-brabo:active { transform: scale(.97); }
    .btn-brabo .brabo-ico { font-size: 1rem; line-height: 1; }
    .btn-brabo::after {
      content: "";
      position: absolute;
      top: 0; left: -130%;
      width: 55%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
      transform: skewX(-20deg);
      animation: braboShine 3.4s ease-in-out infinite;
    }
    @keyframes braboShine {
      0%, 55% { left: -130%; }
      100% { left: 150%; }
    }
    @keyframes braboPulse {
      0%, 100% { box-shadow: 0 4px 14px rgba(255,107,0,0.30); }
      50%      { box-shadow: 0 4px 20px rgba(255,150,0,0.60); }
    }
    @media (prefers-reduced-motion: reduce) {
      .btn-brabo { animation: none; }
      .btn-brabo::after { display: none; }
    }

    /* ── CAMPOS DE FORMULARIO (busca + selects) ── */
    #search-input {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #search-input:focus { border-color: var(--orange); }
    #search-input::placeholder { color: var(--text2); }
    select.filter-select {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }
    select.filter-select:focus { border-color: var(--orange); }

    /* ── RESULTS INFO ── */
    .results-bar {
      padding: 10px 20px;
      font-size: 0.82rem;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .results-bar strong { color: var(--orange); }
    #btn-share-results {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: #25D366;
      color: #07291a;
      border: none;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: filter .15s, transform .1s;
      white-space: nowrap;
    }
    #btn-share-results:hover { filter: brightness(1.08); }
    #btn-share-results:active { transform: scale(.96); }
    #btn-share-results.copied { background: var(--orange); color: #fff; }
    #btn-share-results svg { flex-shrink: 0; }

    /* ── LAYOUT SIDEBAR + CONTEUDO ── */
    .layout {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 18px 20px 40px;
    }
    .sidebar {
      flex: 0 0 250px;
      width: 250px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 96px);
      overflow-y: auto;
      scrollbar-width: thin;
    }
    .sidebar-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-head);
      font-size: 1.05rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text);
      padding-bottom: 12px;
      margin-bottom: 4px;
      border-bottom: 2px solid var(--orange);
    }
    .sb-close { display: none; background: none; border: none; color: var(--text2); font-size: 1.2rem; cursor: pointer; }
    .fgroup { margin-top: 14px; }
    .flabel {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text2);
      margin-bottom: 6px;
    }
    .fgroup #search-input,
    .fgroup .filter-select { width: 100%; }
    .frow { display: flex; gap: 8px; }
    .frow .filter-select { min-width: 0; flex: 1; }
    .fchecks { display: flex; flex-direction: column; gap: 7px; }
    .fchecks label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }
    .fchecks input[type="checkbox"] {
      width: 17px; height: 17px;
      accent-color: var(--orange);
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn-limpar {
      width: 100%;
      margin-top: 18px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 8px;
      padding: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-limpar:hover { border-color: var(--orange); color: var(--text); }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 150;
    }
    .main-col { flex: 1; min-width: 0; }
    /* barra de busca inteligente (sempre visivel) */
    .searchbar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 14px;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .searchbar:focus-within { border-color: var(--orange); }
    .searchbar .sb-ico { color: var(--text2); flex-shrink: 0; }
    .searchbar #search-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      padding: 14px 0;
      font-size: 1rem;
      outline: none;
      min-width: 0;
    }
    .searchbar #search-input::placeholder { color: var(--text2); }
    .sb-clear {
      background: var(--bg2);
      border: none;
      color: var(--text2);
      width: 26px; height: 26px;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 0.9rem;
    }
    .sb-clear:hover { color: var(--text); }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .btn-filtros {
      display: none;
      align-items: center;
      gap: 7px;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .results-count { font-size: 0.82rem; color: var(--text2); }
    .results-count strong { color: var(--orange); }
    .toolbar-actions { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    /* hover so em dispositivo com mouse — evita "sticky hover" que no touch
       consome o 1o toque (o card marcaria/abriria so no 2o toque) */
    @media (hover: hover) and (pointer: fine) {
      .card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow);
        border-color: var(--orange);
      }
    }
    .card.selected {
      border-color: var(--green);
      box-shadow: 0 0 0 2px var(--green);
    }

    /* ── SELECT CHECKBOX (visivel so no modo selecao) ── */
    .card-select {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 3;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(10,10,10,0.72);
      border: 2px solid rgba(255,255,255,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .12s;
    }
    body.select-mode .card-select { display: flex; }
    @media (hover: hover) and (pointer: fine) {
      .card-select:hover { transform: scale(1.08); border-color: var(--green); }
    }
    /* no touch: alvo maior pro dedo */
    @media (hover: none), (pointer: coarse) {
      .card-select { width: 40px; height: 40px; font-size: 1.25rem; }
    }
    .card-select.on {
      background: var(--green);
      border-color: var(--green);
      color: #07291a;
    }

    /* ── BOTAO MODO SELECAO ── */
    #btn-select-mode {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      background: var(--bg3);
      color: var(--text2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color .15s, color .15s, background .15s;
    }
    #btn-select-mode:hover { border-color: var(--green); color: var(--text); }
    body.select-mode #btn-select-mode {
      background: var(--green);
      border-color: var(--green);
      color: #07291a;
    }

    /* ── SELECTION BAR (flutuante) ── */
    #selection-bar {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(120%);
      background: #141414;
      border: 1px solid var(--orange);
      border-radius: 999px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      padding: 10px 10px 10px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 500;
      transition: transform .22s ease;
      max-width: calc(100vw - 24px);
    }
    #selection-bar.show { transform: translateX(-50%) translateY(0); }
    #selection-bar .sel-count { font-size: 0.9rem; font-weight: 700; white-space: nowrap; }
    #selection-bar .sel-count strong { color: var(--orange); }
    #selection-bar button {
      border: none;
      border-radius: 999px;
      padding: 9px 16px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: filter .15s, transform .1s;
    }
    #selection-bar button:active { transform: scale(.96); }
    #btn-send-selected { background: var(--green); color: #07291a; }
    #btn-send-selected.copied { background: var(--orange); color: #fff; }
    #btn-clear-selected { background: var(--bg3); color: var(--text2); border: 1px solid var(--border) !important; }
    @media (max-width: 560px) {
      #selection-bar { gap: 8px; padding: 8px 8px 8px 14px; }
      #selection-bar .sel-count { font-size: 0.8rem; }
      #selection-bar button { padding: 8px 12px; font-size: 0.78rem; }
    }

    /* ── VITRINE (link de selecionados) ── */
    .vitrine-banner {
      background: linear-gradient(135deg, #1a3a2a, #0f2318);
      border-bottom: 1px solid var(--green);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 0.85rem;
      color: var(--text);
    }
    .vitrine-banner strong { color: var(--green); }
    .vitrine-banner button {
      margin-left: auto;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
    }
    .vitrine-banner button:hover { border-color: var(--orange); color: var(--text); }
    .card-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      display: block;
    }
    .card-img-placeholder {
      width: 100%;
      aspect-ratio: 1/1;
      display: block;
      object-fit: cover;
    }
    .card-body {
      padding: 14px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 2px;
    }
    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    .badge-tipo {
      background: var(--bg3);
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .badge-destaque {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
      color: #2a1c05;
      box-shadow: 0 0 10px rgba(230,184,115,0.45);
    }
    .badge-prep {
      background: #1a2a3a;
      color: #60aaff;
      border: 1px solid #2a4a6a;
    }
    .card:has(.badge-destaque) {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px rgba(230,184,115,0.35), var(--shadow);
    }
    .card-title {
      font-family: var(--font-head);
      font-size: 1.12rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: var(--text);
      line-height: 1.2;
    }
    .card-versao {
      font-size: 0.78rem;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-specs {
      display: flex;
      gap: 12px;
      font-size: 0.8rem;
      color: var(--text2);
      margin-top: 2px;
      flex-wrap: wrap;
    }
    .card-specs span { display: flex; align-items: center; gap: 3px; }
    .card-price {
      font-family: var(--font-head);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--orange);
      margin-top: auto;
      padding-top: 8px;
    }
    .card-price-zero { color: var(--text2); font-size: 0.9rem; font-weight: 400; }
    .card-fotos-count {
      font-size: 0.72rem;
      color: var(--text2);
    }

    /* ── SKELETON LOADING (shimmer nos cards enquanto carrega) ── */
    .skel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .skel .sk-img { width: 100%; aspect-ratio: 1/1; }
    .skel .sk-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .skel .sk-line { height: 14px; border-radius: 4px; }
    .skel .sk-line.w60 { width: 60%; }
    .skel .sk-line.w40 { width: 40%; }
    .skel .sk-line.w80 { width: 80%; height: 22px; }
    .sk-shimmer {
      background: linear-gradient(100deg, var(--bg3) 40%, #2e2e2e 50%, var(--bg3) 60%);
      background-size: 200% 100%;
      animation: shimmer 1.3s linear infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── ENTRADA DOS CARDS (stagger fade-in) ── */
    .card { animation: cardIn .38s ease both; }
    .card:nth-child(1)  { animation-delay: .02s; }
    .card:nth-child(2)  { animation-delay: .06s; }
    .card:nth-child(3)  { animation-delay: .10s; }
    .card:nth-child(4)  { animation-delay: .14s; }
    .card:nth-child(5)  { animation-delay: .18s; }
    .card:nth-child(6)  { animation-delay: .22s; }
    .card:nth-child(7)  { animation-delay: .26s; }
    .card:nth-child(8)  { animation-delay: .30s; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── FAB WHATSAPP (some quando a barra de selecao esta ativa) ── */
    #wpp-fab {
      position: fixed;
      right: 16px;
      bottom: 18px;
      z-index: 400;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(37,211,102,0.4);
      text-decoration: none;
      transition: transform .18s ease, box-shadow .2s;
    }
    #wpp-fab:hover { transform: scale(1.08); box-shadow: 0 8px 26px rgba(37,211,102,0.55); }
    body.has-selbar #wpp-fab { transform: scale(0); pointer-events: none; }

    /* ── ACESSIBILIDADE ── */
    :focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; border-radius: 4px; }
    @media (prefers-reduced-motion: reduce) {
      .card, .sk-shimmer { animation: none !important; }
      #selection-bar { transition: none; }
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text2);
    }

</head>

<script>

  let allVehicles = [];
  let filtered = [];
  let currentGalIdx = 0;
  let currentGalPhotos = [];
  let vitrineIds = null;          // null = catalogo completo; array = so estes ids (link de selecao)
  let selectedIds = new Set();    // selecao em andamento (antes de gerar o link)

  // ─── UTILS ────────────────────────────────────────────────────
  const fmtPreco = v => v ? 'R$ ' + v.toLocaleString('pt-BR') : '';
  const fmtKm   = v => v ? v.toLocaleString('pt-BR') + ' km' : '—';
  const thumbUrl = e => (e && String(e).startsWith('http')) ? e : `https://drive.google.com/thumbnail?id=${e}&sz=w520`;
  const fullUrl  = e => (e && String(e).startsWith('http')) ? e : `https://drive.google.com/uc?id=${e}&export=view`;

  function fmtDate(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    } catch { return iso; }
  }

  // ─── DEBOUNCE HELPER ───────────────────────────────────────────
  function debounce(fn, ms) {
    let t;
    return function(...args) {
      clearTimeout(t);
      t = setTimeout(() => fn.apply(this, args), ms);
    };
  }

  // ─── LOAD DATA (com retry automatico) ──────────────────────────
  async function loadData(attempt = 1) {
    const MAX_TRIES = 3;
    const BACKOFFS = [1000, 3000, 6000];
    try {
      const r = await fetch(JSON_URL + '?t=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      // Carros escondidos pelo painel admin nao aparecem no catalogo
      allVehicles = (data.vehicles || []).filter(v => !v.hidden);
      document.getElementById('updated-at').textContent = 'Atualizado em: ' + fmtDate(data.updated_at);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('cars-grid').style.display = 'grid';
      popularFiltros();
      setupVitrine();
      applyFilters();
      // Abre o modal apos o render (evita race condition)
      requestAnimationFrame(() => {
        setTimeout(checkHashAndOpenModal, 50);
      });
    } catch (e) {
      if (attempt < MAX_TRIES) {
        console.warn(`loadData tentativa ${attempt} falhou, retry em ${BACKOFFS[attempt-1]}ms`, e);
        setTimeout(() => loadData(attempt + 1), BACKOFFS[attempt - 1]);
        return;
      }
      document.getElementById('loading').innerHTML = `
        <div style="text-align:center;color:var(--text2);">
          <div style="font-size:3rem;margin-bottom:12px;">⚠️</div>
          <p>Não foi possível carregar o catálogo.</p>
          <p style="font-size:0.8rem;margin-top:8px;">${e.message}</p>
          <button onclick="loadData()" style="margin-top:16px;padding:10px 20px;background:var(--orange);border:none;color:#fff;border-radius:8px;cursor:pointer;font-size:0.9rem;">Tentar novamente</button>
        </div>`;
    }
  }

  // ─── FILTER & SORT ─────────────────────────────────────────────
  // ─── NORMALIZADORES (dados da fonte vêm sujos: acento quebrado, case, variações) ──
  function semAcento(s){ return (s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/�/g,''); }
  function normMarca(m){
    let s = semAcento(String(m||'')).toUpperCase().replace(/[^A-Z ]/g,'').trim();
    if (s.startsWith('VOLKS')) return 'Volkswagen';
    if (s.startsWith('CAOA') || s.startsWith('CHERY')) return 'Chery';
    if (s.startsWith('GWM')) return 'GWM';
    if (s.startsWith('BMW')) return 'BMW';
    if (s.startsWith('MERCEDES')) return 'Mercedes-Benz';
    if (s.startsWith('CITRO')) return 'Citroën';
    if (s.startsWith('HARLEY')) return 'Harley-Davidson';
    if (!s) return '';
    return s.charAt(0) + s.slice(1).toLowerCase();
  }
  function normCambio(c){
    const s = semAcento(String(c||'')).toLowerCase();
    if (s.includes('manual')) return 'Manual';
    if (s.includes('autom') || s.includes('cvt')) return 'Automático';
    return '';
  }
  function normCombust(c){
    const s = semAcento(String(c||'')).toLowerCase();
    if (s.includes('hibrid') || (s.includes('gasolina') && s.includes('eletric'))) return 'Híbrido';
    if (s.includes('eletric')) return 'Elétrico';
    if (s.includes('diesel')) return 'Diesel';
    if (s.includes('flex')) return 'Flex';
    if (s.includes('gasolina')) return 'Gasolina';
    return '';
  }
  const checked = id => [...document.querySelectorAll('#'+id+' input:checked')].map(x => x.value);

  // ─── BUSCA INTELIGENTE: "hb20 onix automatico ate 60k km 80" ───
  function _num(s){
    s = String(s).replace(/[.,]/g,'');
    const m = s.match(/(\d+)\s*(k|mil)?/);
    if (!m) return 0;
    let n = +m[1];
    if (m[2]) n *= 1000;
    else if (n > 0 && n < 1000) n *= 1000;   // "60" solto = 60 mil
    return n;
  }
  function parseBusca(qraw){
    let q = ' ' + semAcento(String(qraw||'').toLowerCase()) + ' ';
    const P = { termos:[], precoDe:0, precoAte:0, kmAte:0, cambio:'', carroceria:'' };
    let m;
    // KM primeiro (contém a palavra "km")
    m = q.match(/(?:km|kilometragem)\s*(?:ate|<=?)?\s*(\d[\d.]*)\s*(k|mil)?/) || q.match(/(\d[\d.]*)\s*(k|mil)?\s*km/);
    if (m) { P.kmAte = _num(m[1] + (m[2]||'')); q = q.replace(m[0], ' '); }
    // Preço faixa: "de X a Y" / "entre X e Y"
    m = q.match(/(?:de|entre)\s*(\d[\d.]*)\s*(k|mil)?\s*(?:a|ate|e)\s*(\d[\d.]*)\s*(k|mil)?/);
    if (m) { P.precoDe = _num(m[1]+(m[2]||'')); P.precoAte = _num(m[3]+(m[4]||'')); q = q.replace(m[0],' '); }
    // Preço teto: "ate X" / "<= X" / "no maximo X"
    if (!P.precoAte) { m = q.match(/(?:ate|<=?|abaixo de|no maximo|maximo|max)\s*(\d[\d.]*)\s*(k|mil)?/); if (m) { P.precoAte = _num(m[1]+(m[2]||'')); q = q.replace(m[0],' '); } }
    // Preço piso: "acima de X" / "a partir de X"
    if (!P.precoDe) { m = q.match(/(?:acima de|a partir de|minimo|min)\s*(\d[\d.]*)\s*(k|mil)?/); if (m) { P.precoDe = _num(m[1]+(m[2]||'')); q = q.replace(m[0],' '); } }
    // Preço valor solto com sufixo: "60k" / "60 mil"
    if (!P.precoAte) { m = q.match(/(\d[\d.]*)\s*(k|mil)\b/); if (m) { P.precoAte = _num(m[1]+m[2]); q = q.replace(m[0],' '); } }
    // Câmbio
    if (/\b(automatico|automatica|automat|aut|auto|cvt)\b/.test(q)) { P.cambio='Automático'; q = q.replace(/\b(automatico|automatica|automat|aut|auto|cvt)\b/g,' '); }
    else if (/\b(manual|mecanico|mecanica|mec)\b/.test(q)) { P.cambio='Manual'; q = q.replace(/\b(manual|mecanico|mecanica|mec)\b/g,' '); }
    // Carroceria
    const carro = { suv:'SUV', hatchback:'HATCH', hatch:'HATCH', sedan:'SEDAN', seda:'SEDAN', picape:'PICAPE', pickup:'PICAPE', caminhonete:'PICAPE', moto:'MOTO' };
    for (const k in carro) { const re = new RegExp('\\b'+k+'\\b'); if (re.test(q)) { P.carroceria = carro[k]; q = q.replace(re,' '); break; } }
    // Termos livres restantes (modelo/marca) — OR entre eles
    const stop = new Set(['de','ate','com','por','reais','carro','carros','ano','anos','na','no','ou','e','a','o']);
    P.termos = q.split(/\s+/).map(s => s.trim()).filter(t => t.length >= 2 && !stop.has(t));
    return P;
  }

  function applyFilters() {
    const P = parseBusca(document.getElementById('search-input').value);
    const sort = document.getElementById('sort-select').value;
    const loja = document.getElementById('loja-select').value;
    const marca = document.getElementById('marca-select').value;
    const modelo = document.getElementById('modelo-select').value;
    // sidebar tem prioridade; se vazio, usa o que a busca inteligente entendeu
    const precoDe = (+document.getElementById('preco-de').value || 0) || P.precoDe;
    const precoAte = (+document.getElementById('preco-ate').value || 0) || P.precoAte;
    const kmAte = (+document.getElementById('km-ate').value || 0) || P.kmAte;
    let cambioF = checked('cambio-checks'); if (!cambioF.length && P.cambio) cambioF = [P.cambio];
    let tipoF = checked('tipo-checks');     if (!tipoF.length && P.carroceria) tipoF = [P.carroceria];
    const combustF = checked('combustivel-checks');
    const termos = P.termos;

    const pool = vitrineIds ? allVehicles.filter(v => vitrineIds.includes(String(v.id))) : allVehicles;
    filtered = pool.filter(v => {
      // termos livres: casa se ALGUM termo aparece (ex "hb20 onix" = hb20 OU onix)
      if (termos.length) {
        const hay = semAcento(`${v.marca} ${v.modelo} ${v.versao} ${v.ano}`.toLowerCase());
        if (!termos.some(t => hay.includes(t))) return false;
      }
      if (loja && v.loja !== loja) return false;
      if (marca && normMarca(v.marca) !== marca) return false;
      if (modelo && (v.modelo||'') !== modelo) return false;
      if (precoDe && (v.preco||0) < precoDe) return false;
      if (precoAte && (v.preco||0) > precoAte) return false;
      if (kmAte && (v.km||0) > kmAte) return false;
      if (tipoF.length && !tipoF.includes(v.tipo)) return false;
      if (cambioF.length && !cambioF.includes(normCambio(v.cambio))) return false;
      if (combustF.length && !combustF.includes(normCombust(v.combustivel))) return false;
      return true;
    });

    // Sort
    const temTipo = tipoF.length > 0;
    const recency = v => (v.added_at ? Date.parse(v.added_at) || 0 : 0);
    filtered.sort((a, b) => {
      // Destaques sempre no topo, independente da ordenacao escolhida
      const da = a.destaque ? 1 : 0, db = b.destaque ? 1 : 0;
      if (db !== da) return db - da;
      // Carros COM foto sempre acima dos sem foto (em preparacao vao pro fim)
      const fa = (a.fotos_drive && a.fotos_drive.length) ? 1 : 0;
      const fb = (b.fotos_drive && b.fotos_drive.length) ? 1 : 0;
      if (fb !== fa) return fb - fa;
      // Motos sempre por último (exceto quando filtro de tipo está ativo)
      if (!temTipo) {
        const ma = a.tipo === 'MOTO' ? 1 : 0, mb = b.tipo === 'MOTO' ? 1 : 0;
        if (ma !== mb) return ma - mb;
      }
      if (sort === 'preco-asc')  return (a.preco||0) - (b.preco||0);
      if (sort === 'preco-desc') return (b.preco||0) - (a.preco||0);
      if (sort === 'ano-desc')   return (b.ano||0) - (a.ano||0);
      if (sort === 'ano-asc')    return (a.ano||0) - (b.ano||0);
      if (sort === 'km-asc')     return (a.km||0) - (b.km||0);
      // 'recent' (padrao): adicionados recentemente primeiro
      const ra = recency(a), rb = recency(b);
      if (rb !== ra) return rb - ra;
      return String(b.id).localeCompare(String(a.id)); // desempate: id maior = mais novo
    });

    renderGrid();
    syncUrlToFilters();
  }

  // ─── RENDER GRID ──────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('cars-grid');
    const rc = document.getElementById('results-count');

    rc.innerHTML = `Mostrando <strong>${filtered.length}</strong> de <strong>${allVehicles.length}</strong> veículos`;

    // Botao "Enviar resultados": so aparece quando ha carros para enviar
    const shareBtn = document.getElementById('btn-share-results');
    if (shareBtn) shareBtn.style.display = filtered.length ? 'inline-flex' : 'none';

    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state">
        <div class="icon">🔍</div>
        <h3>Nenhum veículo encontrado</h3>
        <p>Tente outros filtros ou termos de busca.</p>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map((v, i) => {
      const foto = v.fotos_drive && v.fotos_drive.length ? thumbUrl(v.fotos_drive[0]) : null;
      const precoHtml = v.preco
        ? `<div class="card-price">${fmtPreco(v.preco)}</div>`
        : `<div class="card-price card-price-zero">Consultar preço</div>`;
      const nFotos = v.fotos_drive ? v.fotos_drive.length : 0;

      const isSel = selectedIds.has(String(v.id));
      return `<div class="card ${isSel ? 'selected' : ''}" onclick="cardClick(${i}, '${v.id}')">
        <div class="card-select ${isSel ? 'on' : ''}" onclick="event.stopPropagation(); toggleSelect('${v.id}')" title="Selecionar para enviar" role="checkbox" aria-checked="${isSel}" aria-label="Selecionar ${v.marca} ${v.modelo}">${isSel ? '✓' : ''}</div>
        ${foto
          ? `<img class="card-img" src="${foto}" alt="${v.marca} ${v.modelo}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block';" /><img class="card-img-placeholder" src="em-preparacao.jpg" alt="Em preparação" style="display:none" />`
          : `<img class="card-img-placeholder" src="em-preparacao.jpg" alt="Em preparação" />`}
        <div class="card-body">
          <div class="card-badges">
            ${v.destaque ? `<span class="badge badge-destaque">★ DESTAQUE</span>` : ``}
            ${v.em_preparacao ? `<span class="badge badge-prep">⏳ EM PREPARAÇÃO</span>` : ``}
            <span class="badge badge-tipo">${v.tipo || 'SUV'}</span>
          </div>
          <div class="card-title">${v.marca} ${v.modelo}</div>
          <div class="card-versao">${v.versao || '—'}</div>
          <div class="card-specs">
            <span>📅 ${v.ano || '—'}</span>
            <span>🛣️ ${fmtKm(v.km)}</span>
            ${v.cambio ? `<span>⚙️ ${v.cambio}</span>` : ''}
          </div>
          ${precoHtml}
          ${nFotos > 0 ? `<div class="card-fotos-count">${nFotos} foto${nFotos>1?'s':''}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  // ─── MODAL ─────────────────────────────────────────────────────
  function openModal(idx) {
    const v = filtered[idx];
    if (!v) return;

    currentVehicle    = v;
    currentGalPhotos  = v.fotos_drive || [];
    currentGalIdx     = 0;

    renderGallery();
    renderModalDetails(v);

    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';

    // Atualiza a URL com o ID do carro para link direto
    history.pushState({ carId: v.id }, '', `#carro-${v.id}`);

    // Meta Pixel — ViewContent
    if (typeof fbq !== 'undefined') {
      fbq('track', 'ViewContent', {
        content_name: `${v.marca} ${v.modelo} ${v.ano}`,
        content_category: v.tipo || 'Veículo',
        content_ids: [v.id],
        content_type: 'vehicle',
        value: v.preco || 0,
        currency: 'BRL'
      });
    }
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
    // Remove o hash da URL ao fechar
    history.pushState(null, '', window.location.pathname);
  }

  function renderGallery() {
    const mainImg  = document.getElementById('gal-main-img');
    const thumbsEl = document.getElementById('gallery-thumbs');
    const counter  = document.getElementById('gal-counter');
    const noPhoto  = document.getElementById('gallery-no-photo');
    const prevBtn  = document.getElementById('gal-prev');
    const nextBtn  = document.getElementById('gal-next');

    if (!currentGalPhotos.length) {
      mainImg.style.display  = 'none';
      noPhoto.style.display  = 'flex';
      thumbsEl.innerHTML     = '';
      counter.textContent    = '';
      prevBtn.style.display  = 'none';
      nextBtn.style.display  = 'none';
      return;
    }

    // Mostra imagem principal, esconde placeholder
    noPhoto.style.display  = 'none';
    mainImg.style.display  = 'block';
    mainImg.src            = thumbUrl(currentGalPhotos[0]);
    prevBtn.style.display  = 'flex';
    nextBtn.style.display  = 'flex';
    counter.textContent    = `1 / ${currentGalPhotos.length}`;

    // Thumbs
    thumbsEl.innerHTML = currentGalPhotos.map((id, i) =>
      `<img class="gallery-thumb ${i===0?'active':''}" src="${thumbUrl(id)}" data-idx="${i}" alt="Foto ${i+1}" loading="lazy" />`
    ).join('');

    thumbsEl.querySelectorAll('.gallery-thumb').forEach(t => {
      t.addEventListener('click', () => setGalPhoto(parseInt(t.dataset.idx)));
    });
  }

  function setGalPhoto(idx) {
    if (!currentGalPhotos.length) return;
    idx = (idx + currentGalPhotos.length) % currentGalPhotos.length;
    currentGalIdx = idx;

    const mainImg = document.getElementById('gal-main-img');
    if (mainImg) mainImg.src = thumbUrl(currentGalPhotos[idx]);

    document.querySelectorAll('.gallery-thumb').forEach((t, i) => {
      t.classList.toggle('active', i === idx);
    });

    document.getElementById('gal-counter').textContent = `${idx+1} / ${currentGalPhotos.length}`;

    const thumb = document.querySelector(`.gallery-thumb[data-idx="${idx}"]`);
    if (thumb) thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  document.getElementById('gal-prev').addEventListener('click', () => setGalPhoto(currentGalIdx - 1));
  document.getElementById('gal-next').addEventListener('click', () => setGalPhoto(currentGalIdx + 1));

  // ─── LINK DIRETO POR HASH (com retry para race condition) ─────
  function checkHashAndOpenModal(attempt = 1) {
    const hash = window.location.hash; // ex: #carro-970817
    if (!hash.startsWith('#carro-')) return;
    const carId = hash.replace('#carro-', '');

    // Se ainda nao carregou, tenta de novo em 200ms (ate 5 tentativas)
    if (!allVehicles.length && attempt < 5) {
      setTimeout(() => checkHashAndOpenModal(attempt + 1), 200);
      return;
    }

    const idx = filtered.findIndex(v => String(v.id) === carId);
    if (idx !== -1) {
      openModal(idx);
    } else {
      const idxAll = allVehicles.findIndex(v => String(v.id) === carId);
      if (idxAll !== -1) {
        filtered = allVehicles;
        openModal(idxAll);
      }
    }
  }

  // Também responde ao botão Voltar do navegador
  window.addEventListener('popstate', () => {
    if (!window.location.hash) {
      closeModal();
    } else {
      checkHashAndOpenModal();
    }
  });

  // ─── COMPARTILHAR ──────────────────────────────────────────────
  let currentVehicle = null;

  function shareVehicle() {
    const v = currentVehicle;
    if (!v) return;

    // Evento Contact do Pixel (intencao forte de compartilhar com terceiro)
    if (typeof fbq !== 'undefined') {
      fbq('track', 'Contact', {
        content_name: `${v.marca} ${v.modelo} ${v.ano}`,
        content_category: v.tipo || 'Veículo',
        content_ids: [v.id],
        value: v.preco || 0,
        currency: 'BRL'
      });
    }

    const preco  = v.preco ? `R$ ${Number(v.preco).toLocaleString('pt-BR')}` : 'Consultar';
    const km     = v.km    ? `${Number(v.km).toLocaleString('pt-BR')} km`    : '';
    const url    = `https://luizintrepido.github.io/catalogo-brabo/carros/${v.slug || v.id}`;

    const texto = `🚗 *${v.marca} ${v.modelo} ${v.ano}*\n${v.versao ? v.versao + '\n' : ''}💰 ${preco}${km ? '\n📍 ' + km : ''}\n\n🔗 Ver este carro:\n${url}`;

    // Tenta Web Share API (funciona no celular)
    if (navigator.share) {
      navigator.share({ title: `${v.marca} ${v.modelo} ${v.ano}`, text: texto, url })
        .catch(() => {});
      return;
    }

    // Fallback: copia para área de transferência
    navigator.clipboard.writeText(texto).then(() => {
      const btn = document.getElementById('btn-share');
      if (!btn) return;
      btn.classList.add('copied');
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copiado!`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Compartilhar`;
      }, 2500);
    }).catch(() => {
      // Último fallback: abre WhatsApp com o texto
      window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
    });
  }

  // ─── LINK COMPARTILHAVEL DA BUSCA (filtros via URL) ────────────
  const CATALOG_BASE = location.origin + location.pathname;

  // Le ?busca=&loja=&marca=&sort= da URL e aplica nos controles (1x no load)
  function parseInitialFilters() {
    const p = new URLSearchParams(location.search);
    const q    = p.get('busca') || p.get('q') || '';
    const loja = (p.get('loja') || '').toUpperCase();
    const sort = p.get('sort') || '';
    if (q) document.getElementById('search-input').value = q;
    if (sort) document.getElementById('sort-select').value = sort;
    if (loja) document.getElementById('loja-select').value = loja;
  }

  // Reflete os filtros atuais na barra de endereco (sem recarregar a pagina)
  function currentFilterParams() {
    const p = new URLSearchParams();
    const q    = document.getElementById('search-input').value.trim();
    const loja = document.getElementById('loja-select').value;
    const marca = document.getElementById('marca-select').value;
    const sort = document.getElementById('sort-select').value;
    if (q) p.set('busca', q);
    if (loja) p.set('loja', loja);
    if (marca) p.set('marca', marca);
    if (sort && sort !== 'recent') p.set('sort', sort);
    return p;
  }

  function syncUrlToFilters() {
    const qs = currentFilterParams().toString();
    const newUrl = CATALOG_BASE + (qs ? '?' + qs : '') + location.hash;
    history.replaceState(null, '', newUrl);
  }

  function buildResultsShareUrl() {
    const qs = currentFilterParams().toString();
    return CATALOG_BASE + (qs ? '?' + qs : '');
  }

  // ─── ENVIAR RESULTADOS DA BUSCA PARA UM CLIENTE ────────────────
  function shareResults() {
    if (!filtered.length) return;

    const url = buildResultsShareUrl();
    const MAX_LISTA = 25;
    const linhas = filtered.slice(0, MAX_LISTA).map(v => {
      const preco = v.preco ? `R$ ${Number(v.preco).toLocaleString('pt-BR')}` : 'Sob consulta';
      const km = v.km ? ` · ${Number(v.km).toLocaleString('pt-BR')} km` : '';
      return `• ${v.marca} ${v.modelo} ${v.ano} (${preco}${km})`;
    });
    const resto = filtered.length - MAX_LISTA;
    const extra = resto > 0 ? `\n...e mais ${resto} veículo${resto > 1 ? 's' : ''}` : '';

    const texto =
      `🚗 Separei ${filtered.length} veículo${filtered.length > 1 ? 's' : ''} pra você:\n\n` +
      linhas.join('\n') + extra +
      `\n\n👉 Ver todos com fotos e detalhes:\n${url}`;

    // Evento Contact do Pixel (intencao forte de enviar p/ cliente)
    if (typeof fbq !== 'undefined') {
      fbq('track', 'Contact', {
        content_type: 'product_group',
        content_name: 'Resultados da busca',
        num_items: filtered.length
      });
    }

    // Celular: menu nativo de compartilhamento
    if (navigator.share) {
      navigator.share({ title: 'Veículos selecionados', text: texto, url }).catch(() => {});
      return;
    }
    // Desktop: copia a mensagem e abre o WhatsApp Web
    navigator.clipboard.writeText(texto).then(() => {
      const lbl = document.getElementById('btn-share-results-label');
      const btn = document.getElementById('btn-share-results');
      if (lbl && btn) {
        const orig = lbl.textContent;
        btn.classList.add('copied');
        lbl.textContent = 'Copiado!';
        setTimeout(() => { btn.classList.remove('copied'); lbl.textContent = orig; }, 2200);
      }
      window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
    }).catch(() => {
      window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
    });
  }

  // ─── EVENTS ────────────────────────────────────────────────────
  document.getElementById('btn-share-results').addEventListener('click', shareResults);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  document.addEventListener('keydown', e => {
    if (!document.getElementById('modal-overlay').classList.contains('open')) return;
    if (e.key === 'Escape') closeModal();
    if (e.key === 'ArrowLeft')  setGalPhoto(currentGalIdx - 1);
    if (e.key === 'ArrowRight') setGalPhoto(currentGalIdx + 1);
  });

  // Debounce na busca + evento Search do Pixel
  const debouncedSearch = debounce(() => {
    applyFilters();
    const q = document.getElementById('search-input').value.trim();
    if (q.length >= 3 && typeof fbq !== 'undefined') {
      fbq('track', 'Search', { search_string: q });
    }
  }, 300);
  document.getElementById('search-input').addEventListener('input', e => {
    document.getElementById('sb-clear').style.display = e.target.value ? 'block' : 'none';
    debouncedSearch();
  });
  document.getElementById('sort-select').addEventListener('change', applyFilters);

  // selects e checkboxes da sidebar disparam applyFilters
  ['sort-select','loja-select','marca-select','modelo-select','preco-de','preco-ate','km-ate'].forEach(id => {
    document.getElementById(id).addEventListener('change', applyFilters);
  });
  document.querySelectorAll('#cambio-checks input, #combustivel-checks input, #tipo-checks input')
    .forEach(el => el.addEventListener('change', applyFilters));
  // marca muda -> repopula modelos daquela marca
  document.getElementById('marca-select').addEventListener('change', popularModelos);

  // ─── POPULAR FILTROS a partir do estoque carregado ─────────────
  function popularMarcas() {
    const set = new Set();
    allVehicles.forEach(v => { const m = normMarca(v.marca); if (m) set.add(m); });
    const sel = document.getElementById('marca-select');
    sel.innerHTML = '<option value="">Todas as marcas</option>' +
      [...set].sort((a,b)=>a.localeCompare(b,'pt-BR')).map(m => `<option value="${m}">${m}</option>`).join('');
  }
  function popularModelos() {
    const marca = document.getElementById('marca-select').value;
    const set = new Set();
    allVehicles.forEach(v => {
      if (marca && normMarca(v.marca) !== marca) return;
      if (v.modelo) set.add(v.modelo);
    });
    const sel = document.getElementById('modelo-select');
    sel.innerHTML = '<option value="">Todos os modelos</option>' +
      [...set].sort((a,b)=>a.localeCompare(b,'pt-BR')).map(m => `<option value="${m}">${m}</option>`).join('');
  }
  function popularPrecos() {
    const precos = allVehicles.map(v => v.preco||0).filter(p => p > 0);
    if (!precos.length) return;
    const max = Math.max(...precos);
    const faixas = [];
    for (let p = 20000; p <= Math.min(max, 300000); p += (p < 100000 ? 10000 : 25000)) faixas.push(p);
    faixas.push(999999);
    const fmt = v => v >= 999999 ? '300 mil +' : (v/1000) + ' mil';
    document.getElementById('preco-de').innerHTML = '<option value="">De</option>' +
      faixas.filter(v=>v<999999).map(v => `<option value="${v}">R$ ${fmt(v)}</option>`).join('');
    document.getElementById('preco-ate').innerHTML = '<option value="">Até</option>' +
      faixas.map(v => `<option value="${v}">R$ ${fmt(v)}</option>`).join('');
  }
  function popularFiltros() { popularMarcas(); popularModelos(); popularPrecos(); }

  function limparFiltros() {
    document.getElementById('search-input').value = '';
    document.getElementById('sb-clear').style.display = 'none';
    ['loja-select','marca-select','preco-de','preco-ate','km-ate'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('sort-select').value = 'recent';
    popularModelos();
    document.querySelectorAll('.sidebar input[type="checkbox"]').forEach(c => c.checked = false);
    applyFilters();
  }
  function limparBusca() {
    document.getElementById('search-input').value = '';
    document.getElementById('sb-clear').style.display = 'none';
    applyFilters();
  }

  // ─── SIDEBAR mobile (off-canvas) ───────────────────────────────
  function abrirFiltros() { document.getElementById('sidebar').classList.add('open'); }
  function fecharFiltros() { document.getElementById('sidebar').classList.remove('open'); }

  // ─── MODO SELEÇÃO (botao liga/desliga; checkbox so aparece ativo) ──
  let selectMode = false;

  function toggleSelectMode() {
    selectMode = !selectMode;
    document.body.classList.toggle('select-mode', selectMode);
    document.getElementById('btn-select-mode-icon').textContent = selectMode ? '✕' : '☑';
    document.getElementById('btn-select-mode-label').textContent = selectMode ? 'Cancelar seleção' : 'Selecionar';
    if (!selectMode) {
      // sair do modo limpa tudo
      selectedIds.clear();
      updateSelectionBar();
      renderGrid();
    }
  }

  // clique no card: modo selecao marca/desmarca; modo normal abre modal
  function cardClick(idx, id) {
    if (selectMode) toggleSelect(id);
    else openModal(idx);
  }

  // ─── SELEÇÃO MANUAL DE CARROS (link so com os escolhidos) ──────
  function toggleSelect(id) {
    id = String(id);
    if (selectedIds.has(id)) selectedIds.delete(id);
    else selectedIds.add(id);
    updateSelectionBar();
    renderGrid();
  }

  function clearSelection() {
    selectedIds.clear();
    updateSelectionBar();
    renderGrid();
  }

  function updateSelectionBar() {
    const bar = document.getElementById('selection-bar');
    const n = selectedIds.size;
    document.getElementById('sel-count-n').textContent = n;
    bar.classList.toggle('show', n > 0);
    document.body.classList.toggle('has-selbar', n > 0);   // esconde o FAB do WhatsApp
  }

  function shareSelected() {
    if (!selectedIds.size) return;
    const ids = [...selectedIds];
    const carros = allVehicles.filter(v => selectedIds.has(String(v.id)));
    const url = CATALOG_BASE + '?ids=' + ids.join(',');

    const linhas = carros.map(v => {
      const preco = v.preco ? `R$ ${Number(v.preco).toLocaleString('pt-BR')}` : 'Sob consulta';
      const km = v.km ? ` · ${Number(v.km).toLocaleString('pt-BR')} km` : '';
      return `• ${v.marca} ${v.modelo} ${v.ano} (${preco}${km})`;
    });
    const texto =
      `🚗 Separei ${carros.length} veículo${carros.length > 1 ? 's' : ''} pra você:\n\n` +
      linhas.join('\n') +
      `\n\n👉 Ver com fotos e detalhes:\n${url}`;

    if (typeof fbq !== 'undefined') {
      fbq('track', 'Contact', {
        content_type: 'product_group',
        content_name: 'Seleção manual de veículos',
        num_items: carros.length
      });
    }

    if (navigator.share) {
      navigator.share({ title: 'Veículos selecionados pra você', text: texto, url }).catch(() => {});
      return;
    }
    navigator.clipboard.writeText(texto).then(() => {
      const btn = document.getElementById('btn-send-selected');
      const lbl = document.getElementById('btn-send-selected-label');
      const orig = lbl.textContent;
      btn.classList.add('copied');
      lbl.textContent = 'Copiado!';
      setTimeout(() => { btn.classList.remove('copied'); lbl.textContent = orig; }, 2200);
      window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
    }).catch(() => {
      window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
    });
  }

  // ─── MODO VITRINE (abrir um link ?ids=1,2,3 mostra so esses carros) ──
  function setupVitrine() {
    const p = new URLSearchParams(location.search);
    const idsParam = p.get('ids');
    const banner = document.getElementById('vitrine-banner');
    if (idsParam) {
      vitrineIds = idsParam.split(',').map(s => s.trim()).filter(Boolean);
      const achados = allVehicles.filter(v => vitrineIds.includes(String(v.id))).length;
      document.getElementById('vitrine-count').textContent =
        `${achados} veículo${achados > 1 ? 's' : ''} selecionado${achados > 1 ? 's' : ''} pro Brabo`;
      banner.style.display = 'flex';
    } else {
      vitrineIds = null;
      banner.style.display = 'none';
    }
  }

  function sairDaVitrine() {
    vitrineIds = null;
    document.getElementById('vitrine-banner').style.display = 'none';
    history.replaceState(null, '', CATALOG_BASE);
    applyFilters();
  }

  // ─── SKELETON LOADING ──────────────────────────────────────────
  function renderSkeleton() {
    document.getElementById('loading').innerHTML = Array.from({length: 8}, () => `
      <div class="skel">
        <div class="sk-img sk-shimmer"></div>
        <div class="sk-body">
          <div class="sk-line sk-shimmer w40"></div>
          <div class="sk-line sk-shimmer w60"></div>
          <div class="sk-line sk-shimmer w80"></div>
        </div>
      </div>`).join('');
  }

  // ─── SWIPE NA GALERIA (celular) ────────────────────────────────
  (function() {
    const wrap = document.getElementById('gallery-wrap');
    let x0 = null;
    wrap.addEventListener('touchstart', e => { x0 = e.touches[0].clientX; }, { passive: true });
    wrap.addEventListener('touchend', e => {
      if (x0 === null) return;
      const dx = e.changedTouches[0].clientX - x0;
      if (Math.abs(dx) > 40) setGalPhoto(currentGalIdx + (dx < 0 ? 1 : -1));
      x0 = null;
    }, { passive: true });
  })();

  // ─── INIT ──────────────────────────────────────────────────────
  renderSkeleton();
  parseInitialFilters();
  loadData();
</script>
</body>
</html>
